{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-danger border-0">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> Confirmação de Exclusão</h5>
            </div>
            <div class="card-body p-4 text-center">
                <p class="lead mb-4">Tem certeza que deseja remover este item?</p>
                
                <div class="alert alert-light border mb-4">
                    <strong>{{ obj }}</strong>
                </div>
                
                <p class="text-muted small">Esta ação não pode ser desfeita.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url cancel_url %}" class="btn btn-secondary px-4">Cancelar</a>
                        <button type="submit" class="btn btn-danger px-4">Confirmar Exclusão</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
