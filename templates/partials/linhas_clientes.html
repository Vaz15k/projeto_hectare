{% for cliente in itens %}
<tr>
    <td class="px-4 py-3 fw-bold">{{ cliente.nome }}</td>
    <td class="px-4 py-3">{{ cliente.telefone|default:"-" }}</td>
    <td class="px-4 py-3">{{ cliente.email|default:"-" }}</td>
    <td class="px-4 py-3 font-monospace">{{ cliente.documento|default:"-" }}</td>
    <td class="px-4 py-3 text-end">
        <div class="btn-group">
            <a href="{% url 'maquinas_cliente' cliente.pk %}" class="btn btn-sm btn-outline-success" title="Máquinas">
                <i class="bi bi-gear-wide-connected"></i>
            </a>
            <a href="{% url 'editar_cliente' cliente.pk %}" class="btn btn-sm btn-outline-secondary" title="Editar">
                <i class="bi bi-pencil"></i>
            </a>
        </div>
    </td>
</tr>
{% endfor %}
